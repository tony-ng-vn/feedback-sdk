name: Feature request
description: Suggest a change or addition
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        This project stays small on purpose. The best proposals start from a real
        problem you hit, not from "it would be nice if". Tell us the problem first.
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What are you trying to do that is hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What you have in mind
      description: A rough sketch of the change. Keep it concrete.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: What you considered and ruled out
      description: Show you have thought about it. What else could solve this, and why is it worse?
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Before you submit
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: This solves a concrete problem, not a hypothetical one.
          required: true
